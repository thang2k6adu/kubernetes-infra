# Helm values for ecommerce-api-gateway
# Generated from service.yaml configuration

image:
  repository: ghcr.io/nguyenmanhdat006/api-gateway-ecommerce/api-gateway
  pullPolicy: Always
  tag: "bb73919e4afda4e798d537f421b242af46382c54"

# err is for vs code lint, ignore it
imagePullSecrets:
  []

nameOverride: "ecommerce-api-gateway"
fullnameOverride: ""

replicaCount: 1

strategy:
  type: RollingUpdate
  rollingUpdate:
    maxSurge: 1
    maxUnavailable: 0

serviceAccount:
  create: true
  automount: true
  annotations: {}
  name: ""

podAnnotations: {}
podLabels: {}

podSecurityContext:
  runAsNonRoot: true
  runAsUser: 1001
  fsGroup: 1001
  seccompProfile:
    type: RuntimeDefault

securityContext:
  runAsNonRoot: true
  runAsUser: 1001
  allowPrivilegeEscalation: false
  readOnlyRootFilesystem: true
  capabilities:
    drop:
      - ALL

service:
  type: ClusterIP
  port: 3000
  targetPort: 3000
  annotations: {}

ingress:
  enabled: true
  className: "nginx"
  annotations: {}
  hosts:
    - host: ecommerce-api-gateway.kruzetech.dev
      paths:
        - path: /
          pathType: Prefix

resources:
  requests:
    cpu: "200m"
    memory: "256Mi"
  limits:
    cpu: "1000m"
    memory: "512Mi"

# livenessProbe:
#   httpGet:
#     path: /api/health
#     port: 3000
#   initialDelaySeconds: 30
#   periodSeconds: 10
#   timeoutSeconds: 5
#   successThreshold: 1
#   failureThreshold: 3

# readinessProbe:
#   httpGet:
#     path: /api/health
#     port: 3000
#   initialDelaySeconds: 10
#   periodSeconds: 5
#   timeoutSeconds: 3
#   successThreshold: 1
#   failureThreshold: 3

# startupProbe:
#   httpGet:
#     path: /api/health
#     port: 3000
#   initialDelaySeconds: 0
#   periodSeconds: 10
#   timeoutSeconds: 3
#   successThreshold: 1
#   failureThreshold: 30

autoscaling:
  enabled: false
  minReplicas: 2
  maxReplicas: 10
  targetCPUUtilizationPercentage: 70
  targetMemoryUtilizationPercentage: 80

envFrom:
  - configMapRef:
      name: ecommerce-api-gateway-config
  - secretRef:
      name: ecommerce-api-gateway-secret

configMap:
  enabled: false
  data: {}

secrets:
  enabled: false
  data: {}

# This lint err is for vs code, ignore it
volumes:
  - name: tmp
    emptyDir: {}
  - name: cache
    emptyDir: {}

volumeMounts:
  - name: tmp
    mountPath: /tmp
  - name: cache
    mountPath: /app/cache

persistence:
  enabled: false
  storageClass: ""
  accessMode: ReadWriteOnce
  size: 1Gi
  mountPath: /app/data
  annotations: {}

podDisruptionBudget:
  enabled: true
  minAvailable: 1

nodeSelector: {}
tolerations: []

affinity:
  podAntiAffinity:
    preferredDuringSchedulingIgnoredDuringExecution:
      - weight: 100
        podAffinityTerm:
          labelSelector:
            matchExpressions:
              - key: app.kubernetes.io/name
                operator: In
                values:
                  - ecommerce-api-gateway
          topologyKey: kubernetes.io/hostname

serviceMonitor:
  enabled: false
  interval: 30s
  scrapeTimeout: 10s
  path: /metrics
  labels: {}

sidecars: []
initContainers: []
lifecycle: {}

networkPolicy:
  enabled: false
  policyTypes:
    - Ingress
    - Egress
  ingress:
    - from:
        - namespaceSelector:
            matchLabels:
              name: ingress-nginx
  egress:
    - to:
        - namespaceSelector: {}
      ports:
        - protocol: TCP
          port: 5432
        - protocol: TCP
          port: 6379

rbac:
  create: false
  rules: []

httpRoute:
  enabled: false
